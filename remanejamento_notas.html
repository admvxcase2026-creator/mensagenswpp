<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Remanejamento · VX Case</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0d0e11;
    --bg-grad:radial-gradient(circle at 20% -10%, #1b2140 0%, #0d0e11 45%);
    --panel:#15171c;
    --panel2:#1b1d23;
    --border:#282b33;
    --text:#eef0f4;
    --muted:#8d8f99;
    --accent:#7c9bff;
    --accent2:#38e2a8;
    --accent-grad:linear-gradient(135deg,#7c9bff 0%,#a06bff 100%);
    --danger:#ff6b6f;
    --gold:#e8c775;
    --shadow:0 8px 30px rgba(0,0,0,.35);
  }
  body.light{
    --bg:#f4f5f8;
    --bg-grad:radial-gradient(circle at 20% -10%, #e7ecff 0%, #f4f5f8 45%);
    --panel:#ffffff;
    --panel2:#f6f7fb;
    --border:#e4e6ec;
    --text:#191b1f;
    --muted:#6c6e78;
    --accent:#3f5fe0;
    --accent2:#12a978;
    --accent-grad:linear-gradient(135deg,#3f5fe0 0%,#7c4fe0 100%);
    --danger:#e0393f;
    --gold:#b5872e;
    --shadow:0 8px 24px rgba(20,20,40,.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg-grad), var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    padding:24px;
    min-height:100vh;
    transition:background .25s, color .25s;
  }
  h1,h2,h3,.brand,.gen-btn,.login-name{font-family:'Sora',sans-serif;}
  .wrap{max-width:900px;margin:0 auto;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
  .brand{font-size:20px;font-weight:700;letter-spacing:.02em;background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{color:var(--muted);font-size:13px;margin-top:2px;}
  .topbar-right{display:flex;gap:10px;align-items:center;}
  .user-chip{
    display:flex;align-items:center;gap:8px;
    background:var(--panel2);
    border:1px solid var(--border);
    border-radius:999px;
    padding:6px 14px 6px 8px;
    font-size:13px;
  }
  .user-avatar{
    width:24px;height:24px;border-radius:50%;
    background:var(--accent-grad);
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;color:#fff;
  }
  .icon-btn{
    background:var(--panel2);
    border:1px solid var(--border);
    color:var(--text);
    border-radius:8px;
    padding:8px 12px;
    font-size:13px;
    cursor:pointer;
  }
  .icon-btn:hover{border-color:var(--accent);}
  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:var(--shadow);
  }
  .card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .card-head h2{font-size:13px;margin:0;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;}
  .mini-btn{
    background:var(--panel2);
    border:1px solid var(--border);
    color:var(--accent);
    border-radius:7px;
    padding:7px 12px;
    font-size:12px;
    cursor:pointer;
    font-weight:600;
  }
  .mini-btn:hover{border-color:var(--accent);}
  label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
  input, textarea{
    width:100%;
    background:var(--panel2);
    border:1px solid var(--border);
    border-radius:9px;
    padding:10px 12px;
    color:var(--text);
    font-size:14px;
    outline:none;
    text-transform:uppercase;
    font-family:'Inter',sans-serif;
  }
  input:focus, textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,155,255,.15);}

  /* nota rows */
  .nota-row{
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px;
    margin-bottom:14px;
    background:var(--panel2);
    position:relative;
  }
  .nota-row-top{
    display:grid;
    grid-template-columns:1fr 28px 1fr;
    gap:8px;
    align-items:end;
    margin-bottom:10px;
  }
  .nota-arrow{
    text-align:center;
    color:var(--accent);
    font-size:16px;
    padding-bottom:10px;
    font-weight:700;
  }
  .nota-row-bottom{
    display:grid;
    grid-template-columns:32px 100px 1fr 80px 32px;
    gap:8px;
    align-items:center;
  }
  .nota-row-bottom input{padding:8px 10px;font-size:13px;}
  .rm-btn, .pick-mini{
    background:transparent;
    border:1px solid var(--border);
    border-radius:7px;
    width:32px;height:32px;
    cursor:pointer;
    font-size:14px;
    display:flex;align-items:center;justify-content:center;
    color:var(--accent);
  }
  .rm-btn{color:var(--danger);position:absolute;top:10px;right:10px;width:26px;height:26px;font-size:13px;}
  .rm-btn:hover{border-color:var(--danger);}
  .pick-mini:hover{border-color:var(--accent);}
  .add-btn{
    background:var(--panel2);
    border:1.5px dashed var(--border);
    color:var(--accent);
    border-radius:10px;
    padding:11px 14px;
    cursor:pointer;
    font-size:13px;
    font-weight:600;
    width:100%;
    margin-top:2px;
  }
  .add-btn:hover{border-color:var(--accent);}
  .action-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
  .action-row button{flex:1;min-width:160px;}
  .btn-primary, .gen-btn{
    background:var(--accent-grad);
    border:none;
    color:#fff;
    padding:13px;
    border-radius:10px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    text-transform:none;
    letter-spacing:.01em;
  }
  .btn-primary:hover, .gen-btn:hover{filter:brightness(1.08);}
  .btn-secondary{
    background:var(--panel2);
    border:1px solid var(--border);
    color:var(--text);
    padding:13px;
    border-radius:10px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
  }
  .btn-secondary:hover{border-color:var(--accent);}
  .btn-danger-outline{
    background:transparent;
    border:1px solid var(--border);
    color:var(--danger);
    padding:13px;
    border-radius:10px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
  }
  .btn-danger-outline:hover{border-color:var(--danger);}
  .save-status{font-size:11.5px;color:var(--muted);text-align:center;margin-top:8px;height:14px;}
  .out-wrap{position:relative;}
  #output{
    white-space:pre-wrap;
    min-height:160px;
    font-family:'Consolas',monospace;
    font-size:13.5px;
    line-height:1.6;
    text-transform:none;
  }
  .copy-btn{
    position:absolute;
    top:10px;right:10px;
    background:var(--accent2);
    border:none;
    color:#04231a;
    padding:7px 12px;
    border-radius:7px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
  }
  .copy-btn.copied{background:var(--muted);color:#111;}

  /* login screen */
  .login-overlay{
    position:fixed;inset:0;
    background:var(--bg-grad), var(--bg);
    display:flex;align-items:center;justify-content:center;
    z-index:100;
    flex-direction:column;
    padding:24px;
  }
  .login-box{
    max-width:420px;width:100%;
    text-align:center;
  }
  .login-title{font-size:24px;font-weight:800;margin-bottom:6px;background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .login-sub{color:var(--muted);font-size:13px;margin-bottom:28px;}
  .login-grid{display:flex;flex-direction:column;gap:10px;}
  .login-name{
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--text);
    padding:15px 18px;
    border-radius:12px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    display:flex;align-items:center;gap:12px;
    box-shadow:var(--shadow);
    transition:transform .12s, border-color .12s;
  }
  .login-name:hover{border-color:var(--accent);transform:translateY(-2px);}
  .login-avatar{
    width:34px;height:34px;border-radius:50%;
    background:var(--accent-grad);
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;color:#fff;
    flex-shrink:0;
  }

  /* modal */
  .overlay{
    display:none;
    position:fixed;inset:0;
    background:rgba(0,0,0,.6);
    align-items:center;justify-content:center;
    z-index:50;
    padding:20px;
  }
  .overlay.open{display:flex;}
  .modal{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    padding:22px;
    width:92%;
    max-width:480px;
    max-height:82vh;
    overflow-y:auto;
    box-shadow:var(--shadow);
  }
  .modal h3{margin:0 0 16px;font-size:16px;font-family:'Sora',sans-serif;}
  .modal-add-row{display:flex;gap:8px;margin-bottom:14px;}
  .modal-add-row input{font-size:13px;padding:8px 10px;}
  .modal-add-row button{
    background:var(--accent-grad);border:none;color:#fff;
    border-radius:9px;padding:0 14px;cursor:pointer;font-size:13px;font-weight:600;
    white-space:nowrap;
  }
  .list-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:9px;
    margin-bottom:6px;
    font-size:13px;
    background:var(--panel2);
  }
  .list-item .info{flex:1;margin-right:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .list-item .actions{display:flex;gap:6px;}
  .list-item button{
    background:transparent;border:1px solid var(--border);
    color:var(--text);border-radius:6px;padding:5px 9px;font-size:11px;cursor:pointer;
  }
  .list-item button.use{color:var(--accent);}
  .list-item button.del{color:var(--danger);}
  .modal-close{
    width:100%;margin-top:6px;
    background:var(--panel2);border:1px solid var(--border);
    color:var(--text);padding:11px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;
  }
  .empty-msg{color:var(--muted);font-size:12px;text-align:center;padding:14px 0;}
  .bulk-box{
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px;
    margin-bottom:14px;
    background:var(--panel2);
  }
  .bulk-box label{font-size:11px;margin-bottom:6px;}
  .bulk-box textarea{
    font-size:12.5px;
    text-transform:none;
    resize:vertical;
    font-family:'Consolas',monospace;
    margin-bottom:8px;
  }
  .bulk-btn{
    background:var(--accent-grad);border:none;color:#fff;
    border-radius:8px;padding:9px 12px;font-size:12px;cursor:pointer;font-weight:600;
    width:100%;
  }
  .bulk-btn:hover{filter:brightness(1.08);}
  .hist-item{
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px;
    margin-bottom:10px;
    background:var(--panel2);
  }
  .hist-item .hist-date{font-size:11px;color:var(--muted);margin-bottom:6px;}
  .hist-item .hist-preview{font-size:12.5px;white-space:pre-wrap;max-height:90px;overflow:hidden;text-transform:none;color:var(--text);opacity:.85;font-family:'Consolas',monospace;}
  .hist-item button{margin-top:8px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-title">Bloco de Remanejamento</div>
    <div class="login-sub">Selecione seu nome para continuar</div>
    <div class="login-grid" id="loginGrid"></div>
  </div>
</div>

<div class="wrap" id="mainApp" style="display:none;">
  <div class="topbar">
    <div>
      <div class="brand">Remanejamento · VX Case</div>
      <div class="sub">Anote, salve e gere a mensagem em segundos.</div>
    </div>
    <div class="topbar-right">
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar">?</div>
        <span id="userNameLabel">-</span>
      </div>
      <button class="icon-btn" onclick="trocarUsuario()">Trocar</button>
      <button class="icon-btn" id="themeToggle" onclick="toggleTheme()">🌙</button>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <h2>📝 Bloco de Notas</h2>
      <div style="display:flex;gap:8px;">
        <button class="mini-btn" onclick="openDestinos(null)">Destinos/PDVs</button>
        <button class="mini-btn" onclick="openProdutos(null)">Produtos</button>
        <button class="mini-btn" onclick="openHistorico()">Histórico</button>
      </div>
    </div>

    <datalist id="destinosDatalist"></datalist>
    <datalist id="produtosCodDatalist"></datalist>
    <datalist id="produtosDescDatalist"></datalist>

    <div id="notasList"></div>
    <button class="add-btn" onclick="addNota()">+ Adicionar linha</button>

    <div class="action-row">
      <button class="btn-secondary" onclick="salvarRascunho(true)">💾 Salvar rascunho</button>
      <button class="btn-primary" onclick="gerarMensagem()">🚀 Gerar mensagem</button>
    </div>
    <div class="action-row">
      <button class="btn-danger-outline" onclick="concluir()">✅ Concluir e salvar no histórico (limpa as notas)</button>
    </div>
    <div class="save-status" id="saveStatus"></div>
  </div>

  <div class="card out-wrap">
    <label>Mensagem pronta</label>
    <div id="output">A mensagem gerada vai aparecer aqui.</div>
    <button class="copy-btn" id="copyBtn" onclick="copyOutput()">Copiar</button>
  </div>
</div>

<!-- MODAL DESTINOS -->
<div class="overlay" id="overlayDestinos">
  <div class="modal">
    <h3>Destinos / PDVs cadastrados</h3>
    <div class="modal-add-row">
      <input id="novoDestino" placeholder="NOME DO PDV">
      <button onclick="addDestino()">Adicionar</button>
    </div>
    <div class="bulk-box">
      <label>Adicionar vários de uma vez (um por linha)</label>
      <textarea id="bulkDestinos" rows="4" placeholder="LOJA SHOPPING BARRA&#10;LOJA SALVADOR SHOPPING&#10;LOJA PARALELA"></textarea>
      <button class="bulk-btn" onclick="addDestinosBulk()">Adicionar todos</button>
    </div>
    <div id="listaDestinos"></div>
    <button class="modal-close" onclick="closeModal('overlayDestinos')">Fechar</button>
  </div>
</div>

<!-- MODAL PRODUTOS -->
<div class="overlay" id="overlayProdutos">
  <div class="modal">
    <h3>Produtos cadastrados</h3>
    <div class="modal-add-row">
      <input id="novoCod" placeholder="CÓD" style="max-width:90px;">
      <input id="novoDesc" placeholder="DESCRIÇÃO">
      <button onclick="addProduto()">Adicionar</button>
    </div>
    <div class="bulk-box">
      <label>Adicionar vários de uma vez (um por linha: código - descrição)</label>
      <textarea id="bulkProdutos" rows="5" placeholder="1234 - CAMISETA POLO AZUL P&#10;5678 - CALÇA JEANS M&#10;9012 - BONE PRETO"></textarea>
      <button class="bulk-btn" onclick="addProdutosBulk()">Adicionar todos</button>
    </div>
    <div id="listaProdutos"></div>
    <button class="modal-close" onclick="closeModal('overlayProdutos')">Fechar</button>
  </div>
</div>

<!-- MODAL HISTORICO -->
<div class="overlay" id="overlayHistorico">
  <div class="modal">
    <h3>Histórico de remanejamentos concluídos</h3>
    <div id="listaHistorico"></div>
    <button class="modal-close" onclick="closeModal('overlayHistorico')">Fechar</button>
  </div>
</div>

<script>
/* ================= CONFIG SUPABASE ================= */
const SUPABASE_URL = 'https://fevhyllvfhvzzfhwyjuk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZldmh5bGx2Zmh2enpmaHd5anVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NzEyMTcsImV4cCI6MjA5NDQ0NzIxN30.GJRgEKW1bVWX1957_bKCTO6aVmR_rXWRCmo9-ZJDPiE';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const USUARIOS = ['Rodrigo Pereira', 'Raquel França', 'Amanda Menezes', 'Suiane Lopes', 'Felipe Santana'];
let currentUser = null;
let notaCount = 0;
let pickTargetField = null;
let pickTargetItemRow = null;
let isDirty = false;

/* ================= LOGIN ================= */
function iniciais(nome){
  return nome.split(' ').map(p => p[0]).join('').slice(0,2).toUpperCase();
}
function montarLogin(){
  const grid = document.getElementById('loginGrid');
  grid.innerHTML = USUARIOS.map(nome => `
    <button class="login-name" onclick="entrar('${nome}')">
      <span class="login-avatar">${iniciais(nome)}</span> ${nome}
    </button>
  `).join('');
}
async function entrar(nome){
  currentUser = nome;
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('userAvatar').textContent = iniciais(nome);
  document.getElementById('userNameLabel').textContent = nome;
  await carregarRascunho();
}
function trocarUsuario(){
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('notasList').innerHTML = '';
  currentUser = null;
}

/* ================= THEME ================= */
function toggleTheme(){
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  localStorage.setItem('remanejamento_theme', isLight ? 'light' : 'dark');
  document.getElementById('themeToggle').textContent = isLight ? '☀️' : '🌙';
}
(function initTheme(){
  const saved = localStorage.getItem('remanejamento_theme');
  if(saved === 'light'){
    document.body.classList.add('light');
  }
})();

/* ================= DESTINOS (cadastro) ================= */
function refreshDestinosDatalist(){
  const list = getDestinosCache();
  document.getElementById('destinosDatalist').innerHTML =
    list.map(nome => `<option value="${nome}">`).join('');
}
function getDestinosCache(){ return JSON.parse(localStorage.getItem('remanejamento_destinos') || '[]'); }
function setDestinosCache(arr){ localStorage.setItem('remanejamento_destinos', JSON.stringify(arr)); }

function openDestinos(targetFieldId){
  pickTargetField = targetFieldId;
  renderDestinos();
  document.getElementById('overlayDestinos').classList.add('open');
}
function renderDestinos(){
  const list = getDestinosCache();
  const container = document.getElementById('listaDestinos');
  if(list.length === 0){
    container.innerHTML = '<div class="empty-msg">Nenhum destino cadastrado ainda.</div>';
    return;
  }
  container.innerHTML = list.map((nome, i) => `
    <div class="list-item">
      <div class="info">${nome}</div>
      <div class="actions">
        ${pickTargetField ? `<button class="use" onclick="useDestino(${i})">Usar</button>` : ''}
        <button class="del" onclick="delDestino(${i})">Remover</button>
      </div>
    </div>
  `).join('');
}
function addDestino(){
  const input = document.getElementById('novoDestino');
  const val = input.value.trim().toUpperCase();
  if(!val) return;
  const list = getDestinosCache();
  list.push(val);
  setDestinosCache(list);
  input.value = '';
  renderDestinos();
  refreshDestinosDatalist();
}
function addDestinosBulk(){
  const raw = document.getElementById('bulkDestinos').value;
  const linhas = raw.split('\n').map(l => l.trim().toUpperCase()).filter(l => l.length > 0);
  if(linhas.length === 0) return;
  const list = getDestinosCache();
  linhas.forEach(nome => { if(!list.includes(nome)) list.push(nome); });
  setDestinosCache(list);
  document.getElementById('bulkDestinos').value = '';
  renderDestinos();
  refreshDestinosDatalist();
}
function delDestino(i){
  const list = getDestinosCache();
  list.splice(i,1);
  setDestinosCache(list);
  renderDestinos();
  refreshDestinosDatalist();
}
function useDestino(i){
  const list = getDestinosCache();
  if(pickTargetField){
    document.getElementById(pickTargetField).value = list[i];
  }
  closeModal('overlayDestinos');
}

/* ================= PRODUTOS (cadastro) ================= */
function refreshProdutosDatalist(){
  const list = getProdutosCache();
  document.getElementById('produtosCodDatalist').innerHTML = list.map(p => `<option value="${p.cod}">`).join('');
  document.getElementById('produtosDescDatalist').innerHTML = list.map(p => `<option value="${p.desc}">`).join('');
}
function getProdutosCache(){ return JSON.parse(localStorage.getItem('remanejamento_produtos') || '[]'); }
function setProdutosCache(arr){ localStorage.setItem('remanejamento_produtos', JSON.stringify(arr)); }

function openProdutos(targetItemRowId){
  pickTargetItemRow = targetItemRowId;
  renderProdutos();
  document.getElementById('overlayProdutos').classList.add('open');
}
function renderProdutos(){
  const list = getProdutosCache();
  const container = document.getElementById('listaProdutos');
  if(list.length === 0){
    container.innerHTML = '<div class="empty-msg">Nenhum produto cadastrado ainda.</div>';
    return;
  }
  container.innerHTML = list.map((p, i) => `
    <div class="list-item">
      <div class="info">${p.cod} — ${p.desc}</div>
      <div class="actions">
        ${pickTargetItemRow ? `<button class="use" onclick="useProduto(${i})">Usar</button>` : ''}
        <button class="del" onclick="delProduto(${i})">Remover</button>
      </div>
    </div>
  `).join('');
}
function addProduto(){
  const cod = document.getElementById('novoCod').value.trim().toUpperCase();
  const desc = document.getElementById('novoDesc').value.trim().toUpperCase();
  if(!cod && !desc) return;
  const list = getProdutosCache();
  list.push({cod, desc});
  setProdutosCache(list);
  document.getElementById('novoCod').value = '';
  document.getElementById('novoDesc').value = '';
  renderProdutos();
  refreshProdutosDatalist();
}
function addProdutosBulk(){
  const raw = document.getElementById('bulkProdutos').value;
  const linhas = raw.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if(linhas.length === 0) return;
  const list = getProdutosCache();
  linhas.forEach(linha => {
    let partes = linha.split(/\s-\s|\t|;|\|/);
    if(partes.length < 2){ partes = linha.split('-'); }
    const cod = (partes[0] || '').trim().toUpperCase();
    const desc = partes.slice(1).join(' ').trim().toUpperCase();
    if(cod || desc){ list.push({cod, desc}); }
  });
  setProdutosCache(list);
  document.getElementById('bulkProdutos').value = '';
  renderProdutos();
  refreshProdutosDatalist();
}
function delProduto(i){
  const list = getProdutosCache();
  list.splice(i,1);
  setProdutosCache(list);
  renderProdutos();
  refreshProdutosDatalist();
}
function useProduto(i){
  const list = getProdutosCache();
  if(pickTargetItemRow){
    const row = document.getElementById(pickTargetItemRow);
    row.querySelector('.cod').value = list[i].cod;
    row.querySelector('.desc').value = list[i].desc;
  }
  closeModal('overlayProdutos');
}
function autoFillProduto(rowId, campo){
  const row = document.getElementById(rowId);
  const list = getProdutosCache();
  if(campo === 'cod'){
    const val = row.querySelector('.cod').value.trim().toUpperCase();
    const match = list.find(p => p.cod.toUpperCase() === val);
    if(match) row.querySelector('.desc').value = match.desc;
  } else {
    const val = row.querySelector('.desc').value.trim().toUpperCase();
    const match = list.find(p => p.desc.toUpperCase() === val);
    if(match) row.querySelector('.cod').value = match.cod;
  }
}

function closeModal(id){ document.getElementById(id).classList.remove('open'); }

/* ================= NOTAS (linhas do bloco) ================= */
function addNota(de='', para='', cod='', desc='', qtd=''){
  notaCount++;
  const id = 'nota_' + notaCount;
  const div = document.createElement('div');
  div.className = 'nota-row';
  div.id = id;
  div.innerHTML = `
    <button class="rm-btn" onclick="removeNota('${id}')">×</button>
    <div class="nota-row-top">
      <div>
        <label>De</label>
        <input class="n-de" list="destinosDatalist" autocomplete="off" placeholder="ORIGEM" value="${de}" oninput="marcarDirty()">
      </div>
      <div class="nota-arrow">→</div>
      <div>
        <label>Para</label>
        <input class="n-para" list="destinosDatalist" autocomplete="off" placeholder="DESTINO" value="${para}" oninput="marcarDirty()">
      </div>
    </div>
    <div class="nota-row-bottom">
      <button class="pick-mini" onclick="openProdutos('${id}')" title="Escolher produto">📋</button>
      <input class="cod" list="produtosCodDatalist" autocomplete="off" value="${cod}" placeholder="COD" oninput="autoFillProduto('${id}','cod'); marcarDirty();">
      <input class="desc" list="produtosDescDatalist" autocomplete="off" value="${desc}" placeholder="DESCRIÇÃO DO PRODUTO" oninput="autoFillProduto('${id}','desc'); marcarDirty();">
      <input class="qtd" value="${qtd}" placeholder="QTD" type="number" min="1" oninput="marcarDirty()">
    </div>
  `;
  document.getElementById('notasList').appendChild(div);
}
function removeNota(id){
  document.getElementById(id).remove();
  marcarDirty();
  if(document.querySelectorAll('.nota-row').length === 0){
    addNota();
  }
}
function marcarDirty(){ isDirty = true; }
function coletarNotas(){
  const linhas = [];
  document.querySelectorAll('.nota-row').forEach(row => {
    const de = row.querySelector('.n-de').value.trim().toUpperCase();
    const para = row.querySelector('.n-para').value.trim().toUpperCase();
    const cod = row.querySelector('.cod').value.trim();
    const desc = row.querySelector('.desc').value.trim();
    const qtd = row.querySelector('.qtd').value.trim();
    if(de || para || cod || desc){
      linhas.push({de, para, cod, desc, qtd});
    }
  });
  return linhas;
}
function popularNotas(linhas){
  document.getElementById('notasList').innerHTML = '';
  if(!linhas || linhas.length === 0){
    addNota();
    return;
  }
  linhas.forEach(l => addNota(l.de, l.para, l.cod, l.desc, l.qtd));
}

/* ================= SUPABASE: RASCUNHO ================= */
async function carregarRascunho(){
  document.getElementById('saveStatus').textContent = 'Carregando rascunho...';
  try{
    const { data, error } = await sb
      .from('remanejamento_rascunhos')
      .select('linhas')
      .eq('usuario', currentUser)
      .maybeSingle();
    if(error) throw error;
    popularNotas(data ? data.linhas : []);
    document.getElementById('saveStatus').textContent = data ? 'Rascunho carregado.' : '';
  }catch(e){
    console.error(e);
    popularNotas([]);
    document.getElementById('saveStatus').textContent = 'Não foi possível carregar o rascunho (verifique a conexão/anon key).';
  }
}
async function salvarRascunho(manual){
  const linhas = coletarNotas();
  const status = document.getElementById('saveStatus');
  if(manual) status.textContent = 'Salvando...';
  try{
    const { error } = await sb
      .from('remanejamento_rascunhos')
      .upsert({ usuario: currentUser, linhas, updated_at: new Date().toISOString() });
    if(error) throw error;
    isDirty = false;
    status.textContent = '💾 Rascunho salvo às ' + new Date().toLocaleTimeString('pt-BR');
  }catch(e){
    console.error(e);
    status.textContent = 'Erro ao salvar rascunho.';
  }
}
setInterval(() => { if(isDirty && currentUser) salvarRascunho(false); }, 20000);

/* ================= SUPABASE: HISTORICO ================= */
async function salvarHistorico(mensagem, linhas){
  await sb.from('remanejamento_historico').insert({ usuario: currentUser, mensagem, linhas });
  await sb.from('remanejamento_rascunhos').delete().eq('usuario', currentUser);
}
async function openHistorico(){
  const container = document.getElementById('listaHistorico');
  container.innerHTML = '<div class="empty-msg">Carregando...</div>';
  document.getElementById('overlayHistorico').classList.add('open');
  try{
    const { data, error } = await sb
      .from('remanejamento_historico')
      .select('*')
      .eq('usuario', currentUser)
      .order('criado_em', { ascending: false })
      .limit(25);
    if(error) throw error;
    if(!data || data.length === 0){
      container.innerHTML = '<div class="empty-msg">Nenhum remanejamento concluído ainda.</div>';
      return;
    }
    container.innerHTML = data.map((h, i) => `
      <div class="hist-item">
        <div class="hist-date">${new Date(h.criado_em).toLocaleString('pt-BR')}</div>
        <div class="hist-preview">${h.mensagem.slice(0, 220)}${h.mensagem.length > 220 ? '...' : ''}</div>
        <button class="mini-btn" onclick='copiarHistorico(${i})'>Copiar mensagem completa</button>
      </div>
    `).join('');
    window._historicoCache = data;
  }catch(e){
    console.error(e);
    container.innerHTML = '<div class="empty-msg">Erro ao carregar histórico.</div>';
  }
}
function copiarHistorico(i){
  const msg = window._historicoCache[i].mensagem;
  navigator.clipboard.writeText(msg);
}

async function concluir(){
  const linhas = coletarNotas();
  if(linhas.length === 0){
    alert('Não há nada para concluir.');
    return;
  }
  const msg = montarMensagem(linhas);
  if(!msg){ return; }
  if(!confirm('Isso vai salvar o remanejamento no histórico e limpar o bloco de notas. Confirmar?')) return;
  document.getElementById('output').textContent = msg;
  await salvarHistorico(msg, linhas);
  popularNotas([]);
  isDirty = false;
  document.getElementById('saveStatus').textContent = '✅ Salvo no histórico e notas limpas.';
}

/* ================= GREETING ================= */
function saudacao(){
  const h = new Date().getHours();
  if(h >= 5 && h < 12) return 'Bom dia';
  if(h >= 12 && h < 18) return 'Boa tarde';
  return 'Boa noite';
}

/* ================= GERAR MENSAGEM ================= */
function montarMensagem(linhas){
  const validas = linhas.filter(l => l.de && l.para && (l.cod || l.desc));
  if(validas.length === 0){
    document.getElementById('output').textContent = 'Preencha ao menos uma linha com De, Para e um item.';
    return null;
  }

  // agrupa por DE + PARA, preservando ordem de aparição
  const grupos = [];
  const indices = {};
  validas.forEach(l => {
    const chave = l.de + '→' + l.para;
    if(!(chave in indices)){
      indices[chave] = grupos.length;
      grupos.push({ de: l.de, para: l.para, itens: [] });
    }
    grupos[indices[chave]].itens.push({ cod: l.cod, desc: l.desc, qtd: l.qtd });
  });

  const totalItens = validas.length;
  const plural = totalItens > 1;
  const referencia = plural ? 'desses itens' : 'desse item';
  const pedido = plural ? 'Por gentileza' : 'Por favor';
  const destinosEspeciais = ['ESTOQUE GERAL', 'ESTOQUE QUOTES', 'ADM ESTOQUE'];

  let msg = `${saudacao()}! ${pedido}, solicito que realizem o remanejamento ${referencia} abaixo:\n\n`;

  grupos.forEach((g, idx) => {
    msg += `📤 *DE:* ${g.de}\n📥 *PARA:* ${g.para}\n\n`;
    msg += `📦 *ITENS:*\n\n`;
    g.itens.forEach(it => {
      msg += `🔸 *${it.cod}* — ${it.desc.toUpperCase()} _(Qtd: ${it.qtd || '-'})_\n\n`;
    });
    if(!destinosEspeciais.includes(g.para)){
      msg += `⚠️ *Por favor, pontuem o movimento assim que o remanejamento for realizado.*\n\n`;
    } else {
      msg += `*Conforme novo direcionamento da Diretoria, os pontos de venda precisam informar no prazo máximo de 24 horas se o item foi enviado ou se está inapto para venda.*\n\n`;
    }
    if(idx < grupos.length - 1){
      msg += `➖➖➖➖➖➖➖➖➖➖\n\n`;
    }
  });

  msg += `🙌 Obrigado!`;
  return msg;
}
function gerarMensagem(){
  const linhas = coletarNotas();
  const msg = montarMensagem(linhas);
  if(msg) document.getElementById('output').textContent = msg;
}

function copyOutput(){
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copiado!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copiar';
      btn.classList.remove('copied');
    }, 1500);
  });
}

montarLogin();
refreshDestinosDatalist();
refreshProdutosDatalist();
